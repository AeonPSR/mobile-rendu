<!-- ============================================================================

<!-- Presentation Container -->
<div id="presentation" class="fixed inset-0 flex items-center justify-center gap-8 px-20">
  
  <!-- Slide counter -->
  <div id="counter" class="absolute top-4 left-1/2 -translate-x-1/2 text-white/60 text-sm font-medium"></div>

  <!-- Previous button -->
  <button onclick="prevSlide()" class="absolute left-4 md:left-8 text-white/60 hover:text-white transition-colors p-2 cursor-pointer">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m15 18-6-6 6-6"/>
    </svg>
  </button>

  <!-- Slide content (dark card) -->
  <div id="slide" class="max-w-5xl w-full mx-auto px-10 py-10 rounded-2xl shadow-2xl text-center" style="background:#1C1C1E">
    <div id="icon" class="text-7xl mb-6"></div>
    <h1 id="title" class="text-4xl md:text-5xl font-bold text-white mb-3"></h1>
    <h2 id="subtitle" class="text-xl md:text-2xl mb-8"></h2>
    <div id="content" class="text-white/80 leading-relaxed"></div>
  </div>

  <!-- Side content (for images or graphs) -->
  <div id="side-section" class="flex-shrink-0 flex items-center justify-center hidden">
    <div id="side-content"></div>
    <img id="side-image" class="max-h-[75vh] max-w-md rounded-xl shadow-2xl object-contain hidden" src="" alt="">
  </div>

  <!-- Next button -->
  <button onclick="nextSlide()" class="absolute right-4 md:right-8 text-white/60 hover:text-white transition-colors p-2 cursor-pointer">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m9 18 6-6-6-6"/>
    </svg>
  </button>

  <!-- Slide indicators -->
  <div id="indicators" class="absolute bottom-8 left-1/2 -translate-x-1/2 flex gap-2"></div>

  <!-- Keyboard hint -->
  <div id="hints" class="absolute bottom-4 right-4 text-white/40 text-xs">
    ← → pour naviguer • F11 plein écran
  </div>
</div>

<script>
let currentSlide = 0;

function render() {
  const slide = SLIDES[currentSlide];
  
  document.getElementById('icon').textContent = slide.icon;
  document.getElementById('title').textContent = slide.title;
  document.getElementById('subtitle').textContent = slide.subtitle || '';
  document.getElementById('subtitle').style.color = CONFIG.accentColor;
  document.getElementById('content').innerHTML = slide.content;

  // Handle side content (graph/HTML) or side image
  const sideSection = document.getElementById('side-section');
  const sideContent = document.getElementById('side-content');
  const sideImage = document.getElementById('side-image');
  const mainSlide = document.getElementById('slide');

  if (slide.side) {
    sideSection.classList.remove('hidden');
    sideContent.innerHTML = slide.side;
    sideContent.classList.remove('hidden');
    sideImage.classList.add('hidden');
    mainSlide.classList.remove('max-w-5xl');
    mainSlide.classList.add('max-w-2xl');
  } else if (slide.image) {
    sideSection.classList.remove('hidden');
    sideContent.classList.add('hidden');
    sideImage.classList.remove('hidden');
    sideImage.src = slide.image;
    sideImage.alt = slide.title;
    mainSlide.classList.remove('max-w-5xl');
    mainSlide.classList.add('max-w-2xl');
  } else {
    sideSection.classList.add('hidden');
    sideContent.classList.add('hidden');
    sideImage.classList.add('hidden');
    mainSlide.classList.remove('max-w-2xl');
    mainSlide.classList.add('max-w-5xl');
  }
  
  // Counter
  if (CONFIG.showSlideCounter) {
    document.getElementById('counter').textContent = `${currentSlide + 1} / ${SLIDES.length}`;
  }
  
  // Indicators
  if (CONFIG.showSlideIndicators) {
    const indicators = document.getElementById('indicators');
    indicators.innerHTML = SLIDES.map((_, idx) => `
      <button 
        onclick="goToSlide(${idx})" 
        class="w-3 h-3 rounded-full transition-colors cursor-pointer"
        style="background-color: ${idx === currentSlide ? CONFIG.accentColor : 'rgba(255,255,255,0.3)'}"
      ></button>
    `).join('');
  }
  
  // Hints
  document.getElementById('hints').style.display = CONFIG.showKeyboardHints ? 'block' : 'none';
}

function nextSlide() {
  currentSlide = (currentSlide + 1) % SLIDES.length;
  render();
}

function prevSlide() {
  currentSlide = (currentSlide - 1 + SLIDES.length) % SLIDES.length;
  render();
}

function goToSlide(idx) {
  currentSlide = idx;
  render();
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  switch (e.key) {
    case 'ArrowRight':
    case ' ':
    case 'Enter':
      e.preventDefault();
      nextSlide();
      break;
    case 'ArrowLeft':
      e.preventDefault();
      prevSlide();
      break;
    case 'Home':
      e.preventDefault();
      goToSlide(0);
      break;
    case 'End':
      e.preventDefault();
      goToSlide(SLIDES.length - 1);
      break;
  }
});

// Initial render
render();
</script>
